<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Tycoon Online</title>
    <style>
        body { margin: 0; background: #fffde7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        #global-bar { background: #5d4037; color: #ffca28; width: 100%; text-align: center; padding: 5px; font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        #header { background: #fbc02d; width: 100%; text-align: center; padding: 12px; font-weight: bold; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: #5d4037; }
        #stats { font-size: 40px; margin: 10px; font-weight: bold; color: #5d4037; }
        
        #chicken-container { height: 180px; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; }
        #chicken { width: 130px; cursor: pointer; user-select: none; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; z-index: 5; }
        .bounce { transform: scale(0.8); }

        #golden-egg { 
            position: absolute; width: 50px; cursor: pointer; display: none; 
            filter: hue-rotate(50deg) brightness(1.5) drop-shadow(0 0 15px gold); z-index: 10;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        #menu { background: white; width: 100%; flex-grow: 1; border-radius: 30px 30px 0 0; padding: 15px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px; }
        input#player-name { width: 100%; padding: 10px; border: 2px solid #fbc02d; border-radius: 12px; text-align: center; font-weight: bold; font-size: 14px; outline: none; box-sizing: border-box; }
        
        #rank-list { padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .rank-item { background: #fffde7; margin-bottom: 6px; padding: 10px; border-radius: 10px; border: 1px solid #ffe0b2; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }

        .btn { color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px rgba(0,0,0,0.1); transition: 0.1s; }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        #btn-click { background: #0288d1; }
        #btn-auto { background: #43a047; }
        h3 { margin: 0; font-size: 14px; color: #f57f17; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="global-bar">CLIQUES MUNDIAIS: <span id="global-total">0</span></div>
<div id="header">CHICKEN TYCOON</div>
<div id="stats">🥚 <span id="eggs">0</span></div>

<div id="chicken-container">
    <img id="golden-egg" src="https://cdn-icons-png.flaticon.com/512/2632/2632839.png" onclick="clickGoldenEgg()">
    <img id="chicken" src="https://cdn-icons-png.flaticon.com/512/2632/2632839.png" onclick="clickChicken()">
</div>

<div id="menu">
    <input type="text" id="player-name" placeholder="Digite seu Nome Aqui" onchange="changeName(this.value)">
    
    <button class="btn" id="btn-click" onclick="buyClick()">💪 SUPER DEDO (+1 p/ clique)<br>Preço: 🥚 <span id="click-cost">100</span></button>
    <button class="btn" id="btn-auto" onclick="buyAuto()">👨‍🌾 AJUDANTE (+1 p/ seg)<br>Preço: 🥚 <span id="auto-cost">50</span></button>

    <h3>🏆 Ranking (Cliques Totais)</h3>
    <ul id="rank-list">Carregando...</ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, orderBy, limit, increment, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms",
        authDomain: "chickentycoon.firebaseapp.com",
        projectId: "chickentycoon",
        storageBucket: "chickentycoon.firebasestorage.app",
        messagingSenderId: "531618471959",
        appId: "1:531618471959:web:5484bbd6dcca21e102462e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let data = { eggs: 0, totalClicks: 0, auto: 0, clickPower: 1, autoCost: 50, clickCost: 100 };
    const saved = localStorage.getItem('chickenSave');
    if(saved) Object.assign(data, JSON.parse(saved));

    let playerName = localStorage.getItem('chickenName') || "Fazendeiro_" + Math.floor(Math.random()*1000);
    document.getElementById('player-name').value = playerName;

    const globalRef = doc(db, "stats", "globalCounter");
    const chickenImg = document.getElementById('chicken');
    const goldenEgg = document.getElementById('golden-egg');

    onSnapshot(globalRef, (s) => { 
        if(s.exists()) document.getElementById('global-total').innerText = s.data().total.toLocaleString(); 
        else setDoc(globalRef, {total: 0});
    });

    window.changeName = async (newName) => {
        const cleanedName = newName.trim().substring(0, 15);
        if(cleanedName !== "" && cleanedName !== playerName) {
            const oldName = playerName;
            // Deleta o antigo no Firebase
            await deleteDoc(doc(db, "leaderboard", oldName));
            
            playerName = cleanedName;
            localStorage.setItem('chickenName', playerName);
            saveOnline();
        }
    };

    window.clickChicken = () => {
        data.eggs += data.clickPower;
        data.totalClicks += data.clickPower;
        updateUI();
        chickenImg.classList.add('bounce');
        setTimeout(() => chickenImg.classList.remove('bounce'), 100);
        updateDoc(globalRef, { total: increment(data.clickPower) }).catch(() => setDoc(globalRef, {total: data.clickPower}, {merge:true}));
        if(data.totalClicks % 15 === 0) saveOnline();
    };

    window.clickGoldenEgg = () => {
        const bonus = 100 + (data.auto * 10);
        data.eggs += bonus;
        data.totalClicks += bonus;
        goldenEgg.style.display = 'none';
        updateDoc(globalRef, { total: increment(bonus) });
        updateUI();
        saveOnline();
    };

    window.buyClick = () => {
        if(data.eggs >= data.clickCost) {
            data.eggs -= data.clickCost;
            data.clickPower++;
            data.clickCost = Math.floor(data.clickCost * 2.5);
            updateUI();
            saveOnline();
        }
    };

    window.buyAuto = () => {
        if(data.eggs >= data.autoCost) {
            data.eggs -= data.autoCost;
            data.auto++;
            data.autoCost = Math.floor(data.autoCost * 1.6);
            updateUI();
            saveOnline();
        }
    };

    async function saveOnline() {
        localStorage.setItem('chickenSave', JSON.stringify(data));
        await setDoc(doc(db, "leaderboard", playerName), { name: playerName, score: Math.floor(data.totalClicks) });
        loadRanking();
    }

    async function loadRanking() {
        const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
        const snap = await getDocs(q);
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            list.innerHTML += `<li class="rank-item"><span>${p.name}</span> <b>✨ ${p.score}</b></li>`;
        });
    }

    function updateUI() {
        document.getElementById('eggs').innerText = Math.floor(data.eggs);
        document.getElementById('auto-cost').innerText = data.autoCost;
        document.getElementById('click-cost').innerText = data.clickCost;
    }

    setInterval(() => {
        if(data.auto > 0) {
            data.eggs += data.auto;
            data.totalClicks += data.auto;
            updateUI();
            if(Math.random() < 0.05) {
                saveOnline();
                updateDoc(globalRef, { total: increment(data.auto * 5) });
            }
        }
    }, 1000);

    setInterval(() => {
        if(Math.random() < 0.1) {
            goldenEgg.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            goldenEgg.style.top = Math.random() * 100 + 'px';
            goldenEgg.style.display = 'block';
            setTimeout(() => goldenEgg.style.display = 'none', 4000);
        }
    }, 15000);

    updateUI();
    loadRanking();
</script>
</body>
    </html>
