<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Clicker</title>

<style>

body{
font-family:Arial;
background:#fff8dc;
text-align:center;
margin:0;
}

#game{
max-width:500px;
margin:auto;
padding:20px;
}

h1{
color:#8b4513;
}

#egg{
font-size:40px;
margin:10px;
}

button{
padding:15px;
margin:10px;
border:none;
border-radius:10px;
background:#ffcc00;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffdd33;
}

#rank{
margin-top:20px;
text-align:left;
}

.rank-item{
background:#fff;
margin:5px;
padding:8px;
border-radius:6px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div id="game">

<h1>🐔 Chicken Clicker</h1>

<div id="egg">🥚 0</div>

<button onclick="clickEgg()">CLICAR</button>

<br>

<button onclick="buyClick()">Upgrade Clique</button>

<button onclick="buyAuto()">Auto Farm</button>

<br><br>

<input id="name" placeholder="Seu nome">

<button onclick="saveScore()">Salvar no Ranking</button>

<h3>🏆 Ranking</h3>

<div id="rank">Carregando...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
getFirestore,
doc,
setDoc,
collection,
query,
orderBy,
limit,
getDocsFromServer
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms",

authDomain: "chickentycoon.firebaseapp.com",

projectId: "chickentycoon",

storageBucket: "chickentycoon.firebasestorage.app",

messagingSenderId: "531618471959",

appId: "1:531618471959:web:5484bbd6dcca21e102462e"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let eggs = 0;

let clickPower = 1;

let auto = 0;

const MAX_SCORE = 1000000000000;

function updateUI(){

document.getElementById("egg").innerText =
"🥚 " + Math.floor(eggs).toLocaleString();

}

window.clickEgg = function(){

eggs += clickPower;

if(eggs > MAX_SCORE){

eggs = MAX_SCORE;

}

updateUI();

}

window.buyClick = function(){

let cost = clickPower * 50;

if(eggs >= cost){

eggs -= cost;

clickPower++;

updateUI();

}

}

window.buyAuto = function(){

let cost = (auto+1) * 100;

if(eggs >= cost){

eggs -= cost;

auto++;

updateUI();

}

}

setInterval(()=>{

if(auto>0){

eggs += auto;

if(eggs > MAX_SCORE){

eggs = MAX_SCORE;

}

updateUI();

}

},1000);


window.saveScore = async function(){

let name = document.getElementById("name").value;

if(!name){

alert("Digite um nome");

return;

}

let score = Number(Math.floor(eggs));

await setDoc(doc(db,"ranking",name),{

name:name,

score:score

});

loadRanking();

}

async function loadRanking(){

const list = document.getElementById("rank");

list.innerHTML = "Atualizando...";

const q = query(

collection(db,"ranking"),

orderBy("score","desc"),

limit(10)

);

const snap = await getDocsFromServer(q);

list.innerHTML = "";

let i = 1;

snap.forEach(d=>{

let p = d.data();

list.innerHTML +=

`<div class="rank-item">

<span>${i}. ${p.name}</span>

<span>🥚 ${Math.floor(p.score).toLocaleString()}</span>

</div>`;

i++;

});

}

updateUI();

loadRanking();

</script>
</body>
</html>
