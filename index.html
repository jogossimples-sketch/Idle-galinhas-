<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chicken Tycoon</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#fff3b0,#ffd166);
text-align:center;
}

header{
background:#ffb703;
padding:15px;
font-size:26px;
font-weight:bold;
}

#score{
font-size:36px;
margin-top:20px;
}

#chicken{
width:150px;
margin-top:20px;
cursor:pointer;
transition:0.1s;
}

#chicken:active{
transform:scale(0.9);
}

.menu{
margin-top:25px;
}

button{
padding:12px;
margin:6px;
border:none;
border-radius:10px;
background:#ffb703;
font-weight:bold;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#ffcc00;
}

#shop{
margin-top:20px;
}

.card{
background:white;
padding:12px;
margin:10px;
border-radius:10px;
max-width:300px;
margin-left:auto;
margin-right:auto;
}

#ranking{
margin-top:20px;
max-width:400px;
margin-left:auto;
margin-right:auto;
}

.rank{
background:white;
padding:8px;
margin:5px;
border-radius:6px;
display:flex;
justify-content:space-between;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

</style>
</head>

<body>

<header>🐔 Chicken Tycoon</header>

<div id="score">🥚 0</div>

<img id="chicken"
src="https://cdn-icons-png.flaticon.com/512/2632/2632839.png">

<div class="menu">

<button onclick="buyClick()">💪 Melhorar clique</button>

<button onclick="buyFarm()">🏭 Comprar fazenda</button>

<button onclick="prestige()">✨ Prestígio</button>

</div>

<div id="shop">

<div class="card">
Clique Power: <span id="clickPower">1</span>
</div>

<div class="card">
Fazendas: <span id="farm">0</span>
</div>

<div class="card">
Prestígio: <span id="prestige">0</span>
</div>

</div>

<h3>Salvar ranking</h3>

<input id="playerName" placeholder="Seu nome">

<br>

<button onclick="saveScore()">Enviar pontuação</button>

<h3>🏆 Ranking</h3>

<div id="ranking">Carregando...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
limit,
getDocsFromServer,
setDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms",

authDomain: "chickentycoon.firebaseapp.com",

projectId: "chickentycoon",

storageBucket: "chickentycoon.firebasestorage.app",

messagingSenderId: "531618471959",

appId: "1:531618471959:web:5484bbd6dcca21e102462e"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


let eggs = 0;
let clickPower = 1;
let farm = 0;
let prestigeLevel = 0;

const MAX = 1000000000000000;


function format(n){

return Math.floor(n).toLocaleString();

}

function update(){

document.getElementById("score").innerText =
"🥚 "+format(eggs);

document.getElementById("clickPower").innerText = clickPower;

document.getElementById("farm").innerText = farm;

document.getElementById("prestige").innerText = prestigeLevel;

save();

}

function save(){

localStorage.setItem("chickenSave",
JSON.stringify({eggs,clickPower,farm,prestigeLevel}));

}

function load(){

let s = localStorage.getItem("chickenSave");

if(s){

let d = JSON.parse(s);

eggs=d.eggs||0;
clickPower=d.clickPower||1;
farm=d.farm||0;
prestigeLevel=d.prestigeLevel||0;

}

}

document.getElementById("chicken").onclick = ()=>{

eggs += clickPower*(prestigeLevel+1);

if(eggs>MAX) eggs=MAX;

update();

};

window.buyClick = function(){

let cost = clickPower*150;

if(eggs>=cost){

eggs-=cost;

clickPower++;

update();

}

}

window.buyFarm = function(){

let cost = (farm+1)*500;

if(eggs>=cost){

eggs-=cost;

farm++;

update();

}

}

window.prestige = function(){

if(eggs>=500000){

prestigeLevel++;

eggs=0;
clickPower=1;
farm=0;

update();

}

}

setInterval(()=>{

if(farm>0){

eggs += farm*(prestigeLevel+1);

if(eggs>MAX) eggs=MAX;

update();

}

},1000);


window.saveScore = async function(){

let name = document.getElementById("playerName").value;

if(!name){

alert("Digite seu nome");

return;

}

await setDoc(doc(db,"ranking",name),{

name:name,

score:Number(eggs),

date:Date.now()

});

loadRanking();

}

async function loadRanking(){

let div = document.getElementById("ranking");

div.innerHTML="Carregando...";

const q = query(

collection(db,"ranking"),

orderBy("score","desc"),

limit(10)

);

const snap = await getDocsFromServer(q);

div.innerHTML="";

let pos=1;

snap.forEach(d=>{

let p=d.data();

div.innerHTML +=

`<div class="rank">
<span>${pos}. ${p.name}</span>
<span>${format(p.score)}</span>
</div>`;

pos++;

});

}

load();

update();

loadRanking();

</script>

</body>
</html>
