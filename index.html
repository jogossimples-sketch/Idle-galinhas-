<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, orderBy, limit, increment, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms",
        authDomain: "chickentycoon.firebaseapp.com",
        projectId: "chickentycoon",
        storageBucket: "chickentycoon.firebasestorage.app",
        messagingSenderId: "531618471959",
        appId: "1:531618471959:web:5484bbd6dcca21e102462e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Inicialização dos dados (agora com totalClicks)
    let data = { eggs: 0, totalClicks: 0, auto: 0, cost: 50 };
    const saved = localStorage.getItem('chickenSave');
    if(saved) Object.assign(data, JSON.parse(saved));

    let playerName = localStorage.getItem('chickenName') || "Fazendeiro_" + Math.floor(Math.random()*1000);
    localStorage.setItem('chickenName', playerName);

    const globalRef = doc(db, "stats", "globalCounter");

    // Monitor do Contador Global (Top da tela)
    onSnapshot(globalRef, (docSnap) => {
        if (docSnap.exists()) {
            document.getElementById('global-total').innerText = docSnap.data().total.toLocaleString();
        } else {
            setDoc(globalRef, { total: 0 });
        }
    });

    // Função para somar no Firebase (Mundial)
    async function addGlobalClick(amount) {
        try {
            await updateDoc(globalRef, { total: increment(amount) });
        } catch (e) {
            await setDoc(globalRef, { total: increment(amount) }, { merge: true });
        }
    }

    // --- CLIQUE NA GALINHA ---
    window.clickChicken = () => {
        data.eggs++;         // Saldo para gastar
        data.totalClicks++;  // Pontuação do Ranking (Nunca diminui)
        updateUI();
        
        const img = document.getElementById('chicken');
        img.style.transform = "scale(0.85)";
        setTimeout(() => img.style.transform = "scale(1)", 100);

        addGlobalClick(1);

        // Salva no ranking a cada 10 cliques
        if(data.totalClicks % 10 === 0) saveOnline(); 
    };

    window.clickGoldenEgg = () => {
        data.eggs += 100;
        data.totalClicks += 100;
        document.getElementById('golden-egg').style.display = 'none';
        addGlobalClick(100);
        updateUI();
        saveOnline();
    };

    window.buyAuto = () => {
        if(data.eggs >= data.cost) {
            data.eggs -= data.cost; // Diminui os ovos gastos
            data.auto++;
            data.cost = Math.floor(data.cost * 1.6);
            updateUI();
            // Note que aqui NÃO mexemos no totalClicks, então o Ranking não cai!
            saveOnline();
        }
    };

    async function saveOnline() {
        localStorage.setItem('chickenSave', JSON.stringify(data));
        // Enviamos o "totalClicks" para o ranking, não o saldo de "eggs"
        await setDoc(doc(db, "leaderboard", playerName), { 
            name: playerName, 
            score: Math.floor(data.totalClicks) 
        });
        loadRanking();
    }

    async function loadRanking() {
        const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
        const snap = await getDocs(q);
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            list.innerHTML += `<li class="rank-item"><span>${p.name}</span> <b>✨ ${p.score}</b></li>`;
        });
    }

    function updateUI() {
        document.getElementById('eggs').innerText = Math.floor(data.eggs);
        document.getElementById('cost').innerText = data.cost;
    }

    setInterval(() => {
        if(data.auto > 0) {
            data.eggs += data.auto;
            data.totalClicks += data.auto; // Ajudantes também contam pro ranking
            addGlobalClick(data.auto);
            updateUI();
            if(Math.random() < 0.1) saveOnline();
        }
    }, 1000);

    updateUI();
    loadRanking();
            </script>
