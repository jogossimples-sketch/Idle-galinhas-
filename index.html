<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Tycoon Online</title>
    <style>
        body { margin: 0; background: #fffde7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        #header { background: #fbc02d; width: 100%; text-align: center; padding: 10px; font-weight: bold; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #stats { font-size: 35px; margin: 10px; font-weight: bold; color: #5d4037; z-index: 10; }
        #chicken-container { height: 180px; display: flex; align-items: center; justify-content: center; }
        #chicken { width: 140px; cursor: pointer; user-select: none; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        #chicken:active { transform: scale(0.85); }
        #menu { background: white; width: 100%; flex-grow: 1; border-radius: 25px 25px 0 0; padding: 15px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .rank-item { background: #f9f9f9; margin: 5px 0; padding: 8px; border-radius: 8px; list-style: none; border: 1px solid #eee; display: flex; justify-content: space-between; font-size: 14px; }
        button { background: #43a047; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: auto; font-weight: bold; font-size: 14px; }
        h3 { margin: 0 0 10px 0; color: #f57f17; text-align: center; font-size: 16px; }
        #rank-list { padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
    </style>
</head>
<body>

<div id="header">CHICKEN TYCOON GLOBAL</div>
<div id="stats">🥚 <span id="eggs">0</span></div>

<div id="chicken-container">
    <img id="chicken" src="https://cdn-icons-png.flaticon.com/512/2632/2632839.png" onclick="clickChicken()" alt="Galinha">
</div>

<div id="menu">
    <h3>🏆 Ranking de Fazendeiros</h3>
    <ul id="rank-list">Carregando ranking...</ul>
    <button onclick="buyAuto()">CONTRATAR AJUDANTE (+1/seg)<br>Preço: 🥚 <span id="cost">50</span></button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms",
        authDomain: "chickentycoon.firebaseapp.com",
        projectId: "chickentycoon",
        storageBucket: "chickentycoon.firebasestorage.app",
        messagingSenderId: "531618471959",
        appId: "1:531618471959:web:5484bbd6dcca21e102462e",
        measurementId: "G-FFEQGQQTHS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Inicialização segura dos dados
    let data = { eggs: 0, auto: 0, cost: 50 };
    const saved = localStorage.getItem('chickenSave');
    if(saved) {
        const parsed = JSON.parse(saved);
        data.eggs = parsed.eggs || 0;
        data.auto = parsed.auto || 0;
        data.cost = parsed.cost || 50;
    }

    let playerName = localStorage.getItem('chickenName') || "Fazendeiro_" + Math.floor(Math.random()*1000);
    localStorage.setItem('chickenName', playerName);

    window.clickChicken = () => {
        data.eggs++;
        updateUI();
        if(data.eggs % 10 === 0) saveOnline(); 
    };

    window.buyAuto = () => {
        if(data.eggs >= data.cost) {
            data.eggs -= data.cost;
            data.auto++;
            data.cost = Math.floor(data.cost * 1.6);
            updateUI();
            saveOnline();
        }
    };

    async function saveOnline() {
        localStorage.setItem('chickenSave', JSON.stringify(data));
        try {
            await setDoc(doc(db, "leaderboard", playerName), { 
                name: playerName, 
                score: Math.floor(data.eggs) 
            });
            loadRanking();
        } catch (e) { console.error(e); }
    }

    async function loadRanking() {
        try {
            const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
            const snap = await getDocs(q);
            const list = document.getElementById('rank-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `<li class="rank-item"><span>${p.name}</span> <b>${p.score}</b></li>`;
            });
        } catch (e) { console.error(e); }
    }

    function updateUI() {
        document.getElementById('eggs').innerText = Math.floor(data.eggs);
        document.getElementById('cost').innerText = data.cost;
    }

    setInterval(() => {
        if(data.auto > 0) {
            data.eggs += data.auto;
            updateUI();
            if(Math.random() < 0.05) saveOnline();
        }
    }, 1000);

    // Início
    updateUI();
    loadRanking();
</script>
</body>
</html>
