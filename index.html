<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection, query, orderBy, limit, increment, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms", authDomain: "chickentycoon.firebaseapp.com", projectId: "chickentycoon", storageBucket: "chickentycoon.firebasestorage.app", messagingSenderId: "531618471959", appId: "1:531618471959:web:5484bbd6dcca21e102462e" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const MY_ADMIN_ID = "CHICK-DJEU7";

    let playerID = localStorage.getItem('chickenID') || ("CHICK-" + Math.random().toString(36).substr(2, 5).toUpperCase());
    localStorage.setItem('chickenID', playerID);
    document.getElementById('display-id').innerText = playerID;

    // AUMENTO DE CUSTO INICIAL
    let data = { eggs: 0, totalClicks: 0, auto: 0, clickPower: 1, autoCost: 100, clickCost: 250, prestige: 0, color: 'white', colorBonus: 1, ownedColors: ['white'], startTime: Date.now() };
    let pendingClicksForGlobal = 0; 
    let lastSavedScore = -1;
    let showEffects = localStorage.getItem('chickenEffects') !== 'false';

    const saved = localStorage.getItem('chickenSave');
    if(saved) Object.assign(data, JSON.parse(saved));

    let playerName = localStorage.getItem('chickenName') || "Fazendeiro_" + playerID;
    document.getElementById('player-name').value = playerName;

    const globalRef = doc(db, "stats", "globalCounter");

    // ... (Mantendo as funções de Firebase e Ranking que corrigimos antes) ...

    async function syncWithServer() {
        if (data.totalClicks !== lastSavedScore) {
            try {
                const finalScore = Math.trunc(Number(data.totalClicks));
                await setDoc(doc(db, "Admin", playerID), { name: playerName, score: finalScore, id: playerID }, { merge: true });
                if (pendingClicksForGlobal > 0) {
                    const toAdd = Math.trunc(Number(pendingClicksForGlobal));
                    pendingClicksForGlobal = 0;
                    await setDoc(globalRef, { total: increment(toAdd) }, { merge: true });
                }
                lastSavedScore = data.totalClicks;
            } catch (e) { console.error("Erro na sincronização"); }
        }
        await loadRanking(); 
    }

    async function loadRanking() {
        const list = document.getElementById('rank-list');
        try {
            const q = query(collection(db, "Admin"), orderBy("score", "desc"), limit(10));
            const snap = await getDocs(q, { source: 'server' }); 
            list.innerHTML = ""; 
            let i = 0;
            snap.forEach(d => {
                i++;
                const p = d.data();
                let medal = i === 1 ? "🥇 " : i === 2 ? "🥈 " : i === 3 ? "🥉 " : "";
                const scoreDisplay = Math.trunc(Number(p.score || 0)).toLocaleString();
                list.innerHTML += `<li class="rank-item"><div><b>${medal}${p.name}</b><span class="rank-id">ID: #${p.id || '---'}</span></div><b>🥚 ${scoreDisplay}</b></li>`;
            });
        } catch (e) { list.innerHTML = "Erro ao carregar ranking."; }
    }

    function updateUI() {
        document.getElementById('eggs').innerText = Math.floor(data.eggs).toLocaleString();
        document.getElementById('auto-cost').innerText = data.autoCost.toLocaleString();
        document.getElementById('click-cost').innerText = data.clickCost.toLocaleString();
        document.getElementById('prestige-lv').innerText = data.prestige;
        document.getElementById('chicken').className = "color-" + data.color;

        document.getElementById('p-time').innerText = formatTimePlayed(data.startTime);
        document.getElementById('p-prestige-panel').innerText = data.prestige;
        document.getElementById('p-total').innerText = Math.floor(data.totalClicks).toLocaleString();
        
        // RAINBOW SÓ NO 10 BILHÕES AGORA
        if (playerID === MY_ADMIN_ID || data.totalClicks >= 10000000000 || data.ownedColors.includes('rainbow')) {
            document.getElementById('rainbow-item').style.display = 'flex';
        }

        // NOVAS METAS DE PRESTÍGIO: 10M, 100M, 1B
        const targets = [10000000, 100000000, 1000000000];
        if (data.prestige < 3) {
            let targetVal = targets[data.prestige];
            document.getElementById('prestige-target').innerText = targetVal >= 1000000000 ? "1B" : (targetVal/1000000 + "M");
            document.getElementById('btn-prestige').style.display = data.totalClicks >= targetVal ? 'block' : 'none';
        } else { document.getElementById('btn-prestige').style.display = 'none'; }
    }

    window.clickChicken = (event) => {
        // BÔNUS DE PRESTÍGIO REDUZIDO: de 2^x para 1.5^x
        const bonus = Math.pow(1.5, data.prestige) * data.colorBonus;
        const gain = data.clickPower * bonus;
        data.eggs += gain; data.totalClicks += gain; pendingClicksForGlobal += gain; 
        if (showEffects) createFloatingText(event.clientX, event.clientY, "+" + Math.floor(gain));
        saveLocal();
        document.getElementById('chicken').classList.add('bounce');
        setTimeout(() => document.getElementById('chicken').classList.remove('bounce'), 100);
    };

    // LOJA COM PREÇOS MAIORES E BÔNUS MENORES
    window.buyColor = (col, price, bonus) => {
        if (data.ownedColors.includes(col)) { data.color = col; data.colorBonus = bonus; } 
        else if (data.eggs >= price) { 
            data.eggs -= price; 
            data.ownedColors.push(col); 
            data.color = col; 
            data.colorBonus = bonus; 
        }
        saveLocal();
    };

    window.doPrestige = () => {
        const targets = [10000000, 100000000, 1000000000];
        if (data.totalClicks >= targets[data.prestige] && data.prestige < 3) {
            data.prestige++; 
            data.eggs = 0; 
            data.auto = 0; 
            data.clickPower = 1; 
            data.autoCost = 100; // Reset mais caro
            data.clickCost = 250; // Reset mais caro
            saveLocal(); 
            syncWithServer();
        }
    };

    // INFLAÇÃO MAIOR (Multiplicadores de custo aumentados)
    window.buyClick = () => { 
        if(data.eggs >= data.clickCost) { 
            data.eggs -= data.clickCost; 
            data.clickPower++; 
            data.clickCost = Math.floor(data.clickCost * 3.5); // Era 2.5
            saveLocal(); 
        } 
    };
    window.buyAuto = () => { 
        if(data.eggs >= data.autoCost) { 
            data.eggs -= data.autoCost; 
            data.auto++; 
            data.autoCost = Math.floor(data.autoCost * 2.2); // Era 1.6
            saveLocal(); 
        } 
    };

    // ... (Resto do código igual) ...
                            </script>
