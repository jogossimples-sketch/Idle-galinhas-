<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, orderBy, limit, increment, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms",
        authDomain: "chickentycoon.firebaseapp.com",
        projectId: "chickentycoon",
        storageBucket: "chickentycoon.firebasestorage.app",
        messagingSenderId: "531618471959",
        appId: "1:531618471959:web:5484bbd6dcca21e102462e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let data = { eggs: 0, totalClicks: 0, auto: 0, cost: 50 };
    const saved = localStorage.getItem('chickenSave');
    if(saved) Object.assign(data, JSON.parse(saved));

    let playerName = localStorage.getItem('chickenName') || "Fazendeiro_" + Math.floor(Math.random()*1000);
    localStorage.setItem('chickenName', playerName);

    // --- LOGICA DO CONTADOR GLOBAL (BARRA MARROM) ---
    const globalDocRef = doc(db, "stats", "globalCounter");

    // Fica vigiando o total mundial em tempo real
    onSnapshot(globalDocRef, (snap) => {
        if (snap.exists()) {
            document.getElementById('global-total').innerText = snap.data().total.toLocaleString();
        } else {
            setDoc(globalDocRef, { total: 0 }); // Cria se não existir
        }
    });

    async function syncGlobal(val) {
        try {
            await updateDoc(globalDocRef, { total: increment(val) });
        } catch(e) {
            await setDoc(globalDocRef, { total: increment(val) }, { merge: true });
        }
    }

    // --- CLIQUES ---
    window.clickChicken = () => {
        data.eggs++;
        data.totalClicks++;
        updateUI();
        
        syncGlobal(1); // Manda +1 pro mundo todo

        if(data.totalClicks % 15 === 0) saveOnline();
    };

    window.clickGoldenEgg = () => {
        data.eggs += 100;
        data.totalClicks += 100;
        document.getElementById('golden-egg').style.display = 'none';
        syncGlobal(100); // Manda +100 pro mundo todo
        updateUI();
        saveOnline();
    };

    window.buyAuto = () => {
        if(data.eggs >= data.cost) {
            data.eggs -= data.cost;
            data.auto++;
            data.cost = Math.floor(data.cost * 1.6);
            updateUI();
            saveOnline();
        }
    };

    async function saveOnline() {
        localStorage.setItem('chickenSave', JSON.stringify(data));
        await setDoc(doc(db, "leaderboard", playerName), { 
            name: playerName, 
            score: Math.floor(data.totalClicks) 
        });
        loadRanking();
    }

    async function loadRanking() {
        try {
            const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
            const snap = await getDocs(q);
            const list = document.getElementById('rank-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `<li class="rank-item"><span>${p.name}</span> <b>✨ ${p.score}</b></li>`;
            });
        } catch(e) {}
    }

    function updateUI() {
        document.getElementById('eggs').innerText = Math.floor(data.eggs);
        document.getElementById('cost').innerText = data.cost;
    }

    setInterval(() => {
        if(data.auto > 0) {
            data.eggs += data.auto;
            data.totalClicks += data.auto;
            syncGlobal(data.auto); // Ajudantes também somam pro mundo
            updateUI();
            if(Math.random() < 0.05) saveOnline();
        }
    }, 1000);

    updateUI();
    loadRanking();
        </script>
