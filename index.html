<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDocsFromServer, collection, query, orderBy, limit, increment, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms", authDomain: "chickentycoon.firebaseapp.com", projectId: "chickentycoon", storageBucket: "chickentycoon.firebasestorage.app", messagingSenderId: "531618471959", appId: "1:531618471959:web:5484bbd6dcca21e102462e" };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const MY_ADMIN_ID = "CHICK-DJEU7";

let playerID = localStorage.getItem('chickenID') || ("CHICK-" + Math.random().toString(36).substr(2, 5).toUpperCase());
localStorage.setItem('chickenID', playerID);
document.getElementById('display-id').innerText = playerID;

let data = { eggs: 0, totalClicks: 0, auto: 0, clickPower: 1, autoCost: 50, clickCost: 100, prestige: 0, color: 'white', colorBonus: 1, ownedColors: ['white'], startTime: Date.now() };

let pendingClicksForGlobal = 0;
let lastSavedScore = -1;

const MAX_SCORE = 1000000000000;

const saved = localStorage.getItem('chickenSave');
if(saved) Object.assign(data, JSON.parse(saved));

let playerName = localStorage.getItem('chickenName') || "Fazendeiro_" + playerID;
document.getElementById('player-name').value = playerName;

const globalRef = doc(db, "stats", "globalCounter");

function saveLocal(){
localStorage.setItem('chickenSave', JSON.stringify(data));
updateUI();
}

async function syncWithServer(){

if(data.totalClicks > MAX_SCORE){
data.totalClicks = MAX_SCORE;
}

if (data.totalClicks !== lastSavedScore) {

const scoreToSave = Number(Math.floor(data.totalClicks));

await setDoc(doc(db, "Admin", playerID), {
name: playerName,
score: scoreToSave,
id: playerID
},{ merge: true });

if (pendingClicksForGlobal > 0) {

const toAdd = Math.floor(pendingClicksForGlobal);
pendingClicksForGlobal = 0;

await setDoc(globalRef,{
total: increment(toAdd)
},{ merge: true });

}

lastSavedScore = data.totalClicks;

}

await loadRanking();
}

async function loadRanking(){

const list = document.getElementById('rank-list');
list.innerHTML = "Atualizando...";

try{

const q = query(collection(db, "Admin"), orderBy("score","desc"), limit(10));

const snap = await getDocsFromServer(q);

list.innerHTML = "";

let i = 0;

snap.forEach(d => {

i++;

const p = d.data();

let medal = i===1 ? "🥇 " : i===2 ? "🥈 " : i===3 ? "🥉 " : "";

list.innerHTML += `
<li class="rank-item">
<div>
<b>${medal}${p.name}</b>
<span class="rank-id">ID: #${p.id || "---"}</span>
</div>
<b>🥚 ${Math.floor(p.score).toLocaleString()}</b>
</li>
`;

});

}catch(e){

list.innerHTML = "Erro ao carregar ranking.";

}

}

window.clickChicken = (event)=>{

const bonus = Math.pow(2,data.prestige) * data.colorBonus;

const gain = data.clickPower * bonus;

data.eggs += gain;

data.totalClicks += gain;

if(data.totalClicks > MAX_SCORE){
data.totalClicks = MAX_SCORE;
}

pendingClicksForGlobal += gain;

saveLocal();

};

setInterval(()=>{

if(data.auto>0){

const b = Math.pow(2,data.prestige) * data.colorBonus;

const g = data.auto * b;

data.eggs += g;

data.totalClicks += g;

if(data.totalClicks > MAX_SCORE){
data.totalClicks = MAX_SCORE;
}

pendingClicksForGlobal += g;

saveLocal();

}

},1000);

window.buyClick = ()=>{

if(data.eggs >= data.clickCost){

data.eggs -= data.clickCost;

data.clickPower++;

data.clickCost = Math.floor(data.clickCost * 2.5);

saveLocal();

}

};

window.buyAuto = ()=>{

if(data.eggs >= data.autoCost){

data.eggs -= data.autoCost;

data.auto++;

data.autoCost = Math.floor(data.autoCost * 1.6);

saveLocal();

}

};

window.changeName = (n)=>{

const c = n.trim().substring(0,15);

if(c !== "" && c !== playerName){

playerName = c;

localStorage.setItem('chickenName', playerName);

saveLocal();

syncWithServer();

}

};

window.adminBanAction = async ()=>{

if(playerID !== MY_ADMIN_ID) return;

const target = prompt("ID para banir:");

if(target){

await deleteDoc(doc(db,"Admin",target));

loadRanking();

}

};

function updateUI(){

document.getElementById('eggs').innerText = Math.floor(data.eggs).toLocaleString();

document.getElementById('auto-cost').innerText = data.autoCost;

document.getElementById('click-cost').innerText = data.clickCost;

}

setInterval(syncWithServer,60000);

updateUI();
loadRanking();

    </script>
