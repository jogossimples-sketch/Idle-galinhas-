<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Tycoon Online</title>
    <style>
        body { 
            margin: 0; 
            background: #fffde7; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
            transition: background 0.5s; 
        }
        #loadingScreen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #121212; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 10000; 
        }
        .spinner { 
            border: 4px solid rgba(255,255,255,0.1); 
            border-left-color: #f1c40f; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #global-bar { 
            background: #5d4037; 
            color: #ffca28; 
            width: 100%; 
            text-align: center; 
            padding: 5px; 
            font-size: 12px; 
            font-weight: bold; 
        }
        #header { 
            background: #fbc02d; 
            width: 100%; 
            text-align: center; 
            padding: 12px; 
            font-weight: bold; 
            font-size: 20px; 
            color: #5d4037; 
        }
        #stats-container { 
            text-align: center; 
            margin: 10px; 
            z-index: 10; 
        }
        #stats { 
            font-size: 35px; 
            font-weight: bold; 
            color: #5d4037; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }
        
        .icon-btn { 
            position: absolute; 
            width: 45px; 
            height: 45px; 
            cursor: pointer; 
            z-index: 100; 
            background: white; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 0 #ddd; 
            font-size: 24px; 
            border: 2px solid #ccc; 
        }
        #settings-btn { top: 50px; right: 15px; }
        #shop-btn { top: 110px; right: 15px; border-color: #f44336; color: #f44336; }
        #inventory-btn { top: 170px; right: 15px; border-color: #4caf50; color: #4caf50; }
        #profile-btn { top: 230px; right: 15px; border-color: #0288d1; color: #0288d1; }
        #bg-shop-btn { top: 50px; left: 15px; border-color: #ff9800; color: #ff9800; }

        .float-menu { 
            display: none; 
            position: absolute; 
            top: 100px; 
            right: 70px; 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            z-index: 101; 
            border: 2px solid #fbc02d; 
            min-width: 220px; 
            max-height: 400px; 
            overflow-y: auto; 
        }
        .left-menu { right: auto; left: 70px; border-color: #ff9800; }

        #chicken-container { 
            height: 160px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            width: 100%; 
        }
        #chicken { 
            width: 120px; 
            cursor: pointer; 
            transition: transform 0.1s; 
            z-index: 2; 
        }
        
        .color-white { filter: none; }
        .color-brown { filter: sepia(1) saturate(2) hue-rotate(-30deg); }
        .color-blue { filter: hue-rotate(180deg) brightness(1.2); }
        .color-gold { filter: brightness(1.1) saturate(1.5) drop-shadow(0 0 8px gold); }
        .color-rainbow { animation: rainbow-anim 2s linear infinite; }
        @keyframes rainbow-anim { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        #menu { 
            background: white; 
            width: 100%; 
            flex-grow: 1; 
            border-radius: 30px 30px 0 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            overflow-y: auto; 
        }
        .btn-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        .btn { 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            text-align: center; 
            font-size: 13px; 
        }
        #btn-prestige { background: #9c27b0; grid-column: span 2; display: none; }
        
        .rank-item { 
            background: #fffde7; 
            margin-bottom: 5px; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #ffe0b2; 
            display: flex; 
            flex-direction: column; 
            font-size: 12px; 
        }
        .buy-btn { 
            padding: 5px 10px; 
            border-radius: 5px; 
            border: none; 
            background: #fbc02d; 
            color: #5d4037; 
            font-weight: bold; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div id="loadingScreen"><div class="spinner"></div></div>
<div id="global-bar">CLIQUES MUNDIAIS: <span id="global-total">0</span></div>
<div id="header">CHICKEN TYCOON</div>

<div id="stats-container">
    <div id="prestige-info" style="font-size: 14px; color: #f57f17; font-weight: bold;">🏅 Prestígio: <span id="prestige-lv">0</span></div>
    <div id="stats">🥚 <span id="eggs">0</span></div>
</div>

<div id="bg-shop-btn" class="icon-btn">🖼️</div>
<div id="settings-btn" class="icon-btn">⚙️</div>
<div id="shop-btn" class="icon-btn">🛒</div>
<div id="inventory-btn" class="icon-btn">🎒</div>
<div id="profile-btn" class="icon-btn">📊</div>

<div id="inventory-menu" class="float-menu">
    <h4 style="color: #4caf50; text-align: center; margin: 0 0 10px 0;">🎒 INVENTÁRIO DE CORES</h4>
    <div id="inventory-list"></div>
</div>

<div id="shop-menu" class="float-menu">
    <h4 style="color:#f44336; text-align: center; margin: 0 0 10px 0;">🛒 LOJA DE CORES</h4>
    <div id="shop-list"></div>
</div>

<div id="bg-shop-menu" class="float-menu left-menu">
    <h4 style="color:#ff9800; text-align: center; margin: 0 0 10px 0;">🖼️ PAPÉIS DE PAREDE</h4>
    <div id="bg-list"></div>
</div>

<div id="chicken-container"><img id="chicken" src="https://cdn-icons-png.flaticon.com/512/2632/2632839.png" class="color-white"></div>

<div id="menu">
    <input type="text" id="player-name" placeholder="Seu Nome" maxlength="15" style="width:100%; padding:10px; border-radius:10px; border:2px solid #fbc02d; text-align:center; font-weight:bold;">
    <div style="text-align: center; font-size: 9px; color: #999; margin-bottom: 5px;">ID: <span id="display-id">...</span></div>
    
    <div class="btn-grid">
        <button class="btn" id="btn-prestige">✨ PRESTÍGIO: <span id="prestige-target">1M</span></button>
        <button class="btn" id="btn-click" style="background:#0288d1;">💪 SUPER DEDO<br>🥚 <span id="click-cost">100</span></button>
        <button class="btn" id="btn-auto" style="background:#43a047;">👨‍🌾 AJUDANTE<br>🥚 <span id="auto-cost">50</span></button>
    </div>

    <h3 style="margin-top: 15px; font-size: 16px;">🏆 RANKING GLOBAL</h3>
    <ul id="rank-list" style="list-style: none; padding: 0;"></ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, updateDoc, increment, onSnapshot, query, collection, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms", projectId: "chickentycoon" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function fNum(n) { 
        return n < 1e6 ? Math.floor(n).toLocaleString() : (n/1e6).toFixed(1) + "M"; 
    }

    let playerID = localStorage.getItem('chickenID') || ("CHICK-" + Math.random().toString(36).substr(2, 5).toUpperCase());
    localStorage.setItem('chickenID', playerID);
    document.getElementById('display-id').innerText = playerID;

    let data = { 
        eggs: 0, totalClicks: 0, clickPower: 1, auto: 0, clickCost: 100, autoCost: 50, prestige: 0,
        color: 'white', colorBonus: 1, ownedColors: ['white'],
        bg: 'default', bgBonus: 1, ownedBgs: ['default']
    };
    
    const saved = localStorage.getItem('chickenSave');
    if(saved) Object.assign(data, JSON.parse(saved));

    const shopColors = [
        {id:'brown', name:'Marrom', price:50000, bonus:2},
        {id:'blue', name:'Azul', price:150000, bonus:4},
        {id:'gold', name:'Ouro', price:400000, bonus:8},
        {id:'rainbow', name:'Rainbow', price:1000000, bonus:20}
    ];

    const shopBgs = [
        {id:'farm', name:'Fazenda', price:500000, bonus:2, color:'#e1f5fe'},
        {id:'night', name:'Noite', price:10000000, bonus:5, color:'#263238'},
        {id:'galaxy', name:'Galáxia', price:100000000, bonus:10, color:'#1a237e'}
    ];

    const updateUI = () => {
        document.getElementById('eggs').innerText = fNum(data.eggs);
        document.getElementById('prestige-lv').innerText = data.prestige;
        document.getElementById('click-cost').innerText = fNum(data.clickCost);
        document.getElementById('auto-cost').innerText = fNum(data.autoCost);
        document.getElementById('chicken').className = "color-" + data.color;
        
        const targets = [1e6, 1e8, 1e9];
        if(data.prestige < 3) {
            document.getElementById('prestige-target').innerText = fNum(targets[data.prestige]);
            document.getElementById('btn-prestige').style.display = data.totalClicks >= targets[data.prestige] ? 'block' : 'none';
        }

        renderLists();
    };

    const renderLists = () => {
        const sList = document.getElementById('shop-list');
        sList.innerHTML = "";
        shopColors.forEach(c => {
            if(!data.ownedColors.includes(c.id)) {
                sList.innerHTML += `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${c.name} (${c.bonus}x)</span><button class="buy-btn" onclick="buyItem('color','${c.id}',${c.price})">${fNum(c.price)}</button></div>`;
            }
        });

        const iList = document.getElementById('inventory-list');
        iList.innerHTML = "";
        data.ownedColors.forEach(id => {
            const name = id === 'white' ? 'Branca' : shopColors.find(c => c.id === id).name;
            iList.innerHTML += `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${name}</span><button class="buy-btn" style="background:#4caf50" onclick="equip('color','${id}')">${data.color === id ? 'USANDO' : 'EQUIPAR'}</button></div>`;
        });

        const bList = document.getElementById('bg-list');
        bList.innerHTML = "";
        shopBgs.forEach(b => {
            if(!data.ownedBgs.includes(b.id)) {
                bList.innerHTML += `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${b.name} (${b.bonus}x)</span><button class="buy-btn" onclick="buyItem('bg','${b.id}',${b.price})">${fNum(b.price)}</button></div>`;
            } else {
                bList.innerHTML += `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${b.name}</span><button class="buy-btn" style="background:#ff9800" onclick="equip('bg','${b.id}')">${data.bg === b.id ? 'USANDO' : 'USAR'}</button></div>`;
            }
        });
    };

    window.buyItem = (type, id, price) => {
        if(data.eggs >= price) {
            data.eggs -= price;
            if(type === 'color') data.ownedColors.push(id);
            else data.ownedBgs.push(id);
            save();
        }
    };

    window.equip = (type, id) => {
        if(type === 'color') {
            data.color = id;
            data.colorBonus = id === 'white' ? 1 : shopColors.find(c => c.id === id).bonus;
        } else {
            data.bg = id;
            data.bgBonus = id === 'default' ? 1 : shopBgs.find(b => b.id === id).bonus;
            document.body.style.backgroundColor = id === 'default' ? '#fffde7' : shopBgs.find(b => b.id === id).color;
        }
        save();
    };

    document.getElementById('chicken').onclick = () => {
        const gain = data.clickPower * Math.pow(4, data.prestige) * data.colorBonus * data.bgBonus;
        data.eggs += gain; data.totalClicks += gain;
        updateDoc(doc(db, "stats", "globalCounter"), { total: increment(Math.floor(gain)) });
        save();
    };

    document.getElementById('btn-click').onclick = () => {
        if(data.eggs >= data.clickCost) { data.eggs -= data.clickCost; data.clickPower *= 2; data.clickCost *= 3; save(); }
    };

    document.getElementById('btn-auto').onclick = () => {
        if(data.eggs >= data.autoCost) { data.eggs -= data.autoCost; data.auto = data.auto === 0 ? 1 : data.auto * 2; data.autoCost *= 2; save(); }
    };

    const save = () => { 
        localStorage.setItem('chickenSave', JSON.stringify(data)); 
        updateUI(); 
    };

    const sync = () => {
        setDoc(doc(db, "Admin", playerID), { 
            name: document.getElementById('player-name').value || "Fazendeiro", 
            score: data.totalClicks, 
            id: playerID 
        }, { merge: true });
    };

    document.getElementById('player-name').onchange = sync;

    onSnapshot(query(collection(db, "Admin"), orderBy("score", "desc"), limit(10)), (snap) => {
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            list.innerHTML += `<li class="rank-item"><b>${p.name}</b><span style="font-size:9px;color:#999;">#${p.id}</span><span>🥚 ${fNum(p.score)}</span></li>`;
        });
    });

    onSnapshot(doc(db, "stats", "globalCounter"), (d) => { 
        if(d.exists()) document.getElementById('global-total').innerText = fNum(d.data().total); 
    });

    setInterval(() => { 
        if(data.auto > 0) { 
            const gain = (data.auto * Math.pow(4, data.prestige) * data.colorBonus * data.bgBonus);
            data.eggs += gain; 
            data.totalClicks += gain; 
            save(); 
        } 
    }, 1000);

    setInterval(sync, 60000);

    const toggle = (id) => { 
        const el = document.getElementById(id); 
        const vis = el.style.display === 'block';
        document.querySelectorAll('.float-menu').forEach(m => m.style.display = 'none');
        if(el) el.style.display = vis ? 'none' : 'block';
    };

    document.getElementById('shop-btn').onclick = () => toggle('shop-menu');
    document.getElementById('inventory-btn').onclick = () => toggle('inventory-menu');
    document.getElementById('bg-shop-btn').onclick = () => toggle('bg-shop-menu');

    window.onload = () => { 
        document.getElementById('loadingScreen').style.display='none'; 
        updateUI(); 
    };
</script>
</body>
    </html>
