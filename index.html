<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection, query, orderBy, limit, increment, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Verifique se esses dados são EXATAMENTE os do seu Firebase Console
    const firebaseConfig = {
        apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms",
        authDomain: "chickentycoon.firebaseapp.com",
        projectId: "chickentycoon",
        storageBucket: "chickentycoon.firebasestorage.app",
        messagingSenderId: "531618471959",
        appId: "1:531618471959:web:5484bbd6dcca21e102462e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let data = { eggs: 0, totalClicks: 0, auto: 0, clickPower: 1, autoCost: 50, clickCost: 100 };
    const saved = localStorage.getItem('chickenSave');
    if(saved) Object.assign(data, JSON.parse(saved));

    let playerName = localStorage.getItem('chickenName') || "Jogador_" + Math.floor(Math.random()*1000);
    document.getElementById('player-name').value = playerName;

    const globalRef = doc(db, "stats", "globalCounter");

    // Monitor do Contador Global
    onSnapshot(globalRef, (s) => { 
        if(s.exists()) document.getElementById('global-total').innerText = s.data().total.toLocaleString(); 
    });

    window.changeName = async (newName) => {
        const cleanedName = newName.trim().substring(0, 15);
        if(cleanedName !== "" && cleanedName !== playerName) {
            try {
                // Tenta deletar o antigo antes de mudar
                await deleteDoc(doc(db, "ranking_geral", playerName));
                playerName = cleanedName;
                localStorage.setItem('chickenName', playerName);
                saveOnline();
            } catch(e) { console.log("Erro ao mudar nome"); }
        }
    };

    window.clickChicken = () => {
        data.eggs += data.clickPower;
        data.totalClicks += data.clickPower;
        updateUI();
        
        // Somar no Global
        updateDoc(globalRef, { total: increment(data.clickPower) }).catch(() => setDoc(globalRef, {total: data.clickPower}));

        // Salvar no Ranking a cada 5 cliques (Para teste rápido)
        if(data.totalClicks % 5 === 0) saveOnline();
    };

    async function saveOnline() {
        localStorage.setItem('chickenSave', JSON.stringify(data));
        // Usando a nova coleção 'ranking_geral' para destravar
        await setDoc(doc(db, "ranking_geral", playerName), { 
            name: playerName, 
            score: Math.floor(data.totalClicks) 
        });
        loadRanking();
    }

    async function loadRanking() {
        try {
            const q = query(collection(db, "ranking_geral"), orderBy("score", "desc"), limit(10));
            const snap = await getDocs(q);
            const list = document.getElementById('rank-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `<li class="rank-item"><span>${p.name}</span> <b>✨ ${p.score}</b></li>`;
            });
        } catch(e) { console.log("Erro ao carregar ranking"); }
    }

    // ... Restante das funções de upgrade (buyAuto, buyClick, updateUI) mantidas iguais ...
    // [MANTENHA AS FUNÇÕES buyAuto, buyClick E updateUI DO SEU CÓDIGO ANTERIOR AQUI]
    
    updateUI();
    loadRanking();
                </script>
