<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Tycoon Online</title>
    <style>
        body { margin: 0; background: #fffde7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; position: relative; }
        
        /* TELA DE LOADING */
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.5s; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #f1c40f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #global-bar { background: #5d4037; color: #ffca28; width: 100%; text-align: center; padding: 5px; font-size: 12px; font-weight: bold; }
        #header { background: #fbc02d; width: 100%; text-align: center; padding: 12px; font-weight: bold; font-size: 20px; color: #5d4037; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #stats-container { text-align: center; margin: 10px; }
        #prestige-info { font-size: 14px; color: #f57f17; font-weight: bold; margin-bottom: 5px; }
        #stats { font-size: 35px; font-weight: bold; color: #5d4037; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .icon-btn { position: absolute; width: 45px; height: 45px; cursor: pointer; z-index: 100; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #ddd; font-size: 24px; border: 2px solid #ccc; }
        .icon-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #ddd; }
        #settings-btn { top: 50px; right: 15px; }
        #shop-btn { top: 110px; right: 15px; border-color: #f44336; color: #f44336; }
        
        /* BOTÃO DE ADMIN (BAN) */
        #admin-btn { top: 170px; right: 15px; display: none; background: #212121; color: #ff5252; border-color: #ff5252; }

        .float-menu { display: none; position: absolute; top: 100px; right: 70px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 101; border: 2px solid #fbc02d; min-width: 180px; }
        #chicken-container { height: 160px; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; }
        #chicken { width: 120px; cursor: pointer; transition: transform 0.1s, filter 0.3s; -webkit-tap-highlight-color: transparent; z-index: 2; }
        .bounce { transform: scale(0.8); }
        
        .color-white { filter: none; }
        .color-brown { filter: sepia(1) saturate(2) hue-rotate(-30deg); }
        .color-blue { filter: hue-rotate(180deg) brightness(1.2); }
        .color-gold { filter: brightness(1.1) saturate(1.5) drop-shadow(0 0 8px gold); }
        
        /* ANIMAÇÃO RAINBOW */
        .color-rainbow { animation: rainbow-anim 2s linear infinite; }
        @keyframes rainbow-anim {
            0% { filter: hue-rotate(0deg) drop-shadow(0 0 10px red); }
            33% { filter: hue-rotate(120deg) drop-shadow(0 0 10px green); }
            66% { filter: hue-rotate(240deg) drop-shadow(0 0 10px blue); }
            100% { filter: hue-rotate(360deg) drop-shadow(0 0 10px red); }
        }

        .click-text { position: absolute; color: #f57f17; font-weight: bold; font-size: 22px; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        #menu { background: white; width: 100%; flex-grow: 1; border-radius: 30px 30px 0 0; padding: 15px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 13px; text-align: center; }
        #btn-click { background: #0288d1; }
        #btn-auto { background: #43a047; }
        #btn-prestige { background: #9c27b0; grid-column: span 2; display: none; animation: pulse 1.5s infinite; }
        .rank-item { background: #fffde7; margin-bottom: 5px; padding: 10px; border-radius: 8px; border: 1px solid #ffe0b2; display: flex; justify-content: space-between; font-size: 12px; align-items: center; }
        .rank-id { font-size: 9px; color: #999; display: block; }
        h3 { margin: 5px 0; font-size: 14px; color: #f57f17; text-align: center; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .buy-color-btn { padding: 5px 10px; border-radius: 5px; border: none; background: #fbc02d; color: #5d4037; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="spinner"></div>
    <p style="color: white; font-family: sans-serif; margin-top: 15px; font-size: 11px; letter-spacing: 1px;">CARREGANDO FAZENDA...</p>
</div>

<div id="global-bar">CLIQUES MUNDIAIS: <span id="global-total">0</span></div>
<div id="header">CHICKEN TYCOON</div>

<div id="stats-container">
    <div id="prestige-info">🏅 Prestígio: <span id="prestige-lv">0</span>/3</div>
    <div id="stats">🥚 <span id="eggs">0</span></div>
</div>

<div id="settings-btn" class="icon-btn" onclick="toggleMenu('settings-menu')">⚙️</div>
<div id="shop-btn" class="icon-btn" onclick="toggleMenu('shop-menu')">🛒</div>
<div id="admin-btn" class="icon-btn" onclick="adminBanAction()">🚫</div>

<div id="settings-menu" class="float-menu">
    <h4 style="margin:0 0 10px 0; font-size:14px;">Configurações</h4>
    <label style="font-size: 12px; font-weight: bold;"><input type="checkbox" id="toggle-effects" checked onchange="saveSettings()"> Mostrar efeitos (+1)</label>
</div>

<div id="shop-menu" class="float-menu">
    <h4 style="margin:0 0 10px 0; font-size:14px; color:#f44336;">Loja de Cores</h4>
    <div class="shop-item"><span>⚪ Branca (1x)</span><button class="buy-color-btn" onclick="buyColor('white', 0, 1)">USAR</button></div>
    <div class="shop-item"><span>🟤 Marrom (2x)</span><button class="buy-color-btn" onclick="buyColor('brown', 50000, 2)">50k</button></div>
    <div class="shop-item"><span>🔵 Azul (4x)</span><button class="buy-color-btn" onclick="buyColor('blue', 150000, 4)">150k</button></div>
    <div class="shop-item"><span>🟡 Ouro (8x)</span><button class="buy-color-btn" onclick="buyColor('gold', 500000, 8)">500k</button></div>
    <div class="shop-item" id="rainbow-item" style="display: none;"><span>🌈 Rainbow (20x)</span><button class="buy-color-btn" onclick="buyColor('rainbow', 0, 20)">USAR</button></div>
</div>

<div id="chicken-container"><img id="chicken" src="https://cdn-icons-png.flaticon.com/512/2632/2632839.png" class="color-white" onclick="clickChicken(event)"></div>

<div id="menu">
    <input type="text" id="player-name" placeholder="Seu Nome" onchange="changeName(this.value)" style="width:100%; padding:10px; border-radius:10px; border:2px solid #fbc02d; text-align:center; font-weight:bold; box-sizing:border-box;">
    <div style="text-align: center; font-size: 9px; color: #999; margin-top: 4px;">ID: <span id="display-id">...</span></div>
    
    <div class="btn-grid">
        <button class="btn" id="btn-prestige" onclick="doPrestige()">✨ PRESTÍGIO: <span id="prestige-target">250k</span></button>
        <button class="btn" id="btn-click" onclick="buyClick()">💪 SUPER DEDO<br>🥚 <span id="click-cost">100</span></button>
        <button class="btn" id="btn-auto" onclick="buyAuto()">👨‍🌾 AJUDANTE<br>🥚 <span id="auto-cost">50</span></button>
    </div>
    <h3>🏆 RANKING GLOBAL</h3>
    <ul id="rank-list" style="list-style: none; padding: 0;">Carregando...</ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection, query, orderBy, limit, increment, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms",
        authDomain: "chickentycoon.firebaseapp.com",
        projectId: "chickentycoon",
        storageBucket: "chickentycoon.firebasestorage.app",
        messagingSenderId: "531618471959",
        appId: "1:531618471959:web:5484bbd6dcca21e102462e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // CONFIGURAÇÃO DE ADMIN
    const MY_ADMIN_ID = "CHICK-DJEU7";

    let playerID = localStorage.getItem('chickenID');
    if (!playerID) {
        playerID = "CHICK-" + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('chickenID', playerID);
    }
    document.getElementById('display-id').innerText = playerID;

    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById("loadingScreen");
            loader.style.opacity = "0";
            setTimeout(() => loader.style.display = "none", 500);
        }, 2000);
    });

    let data = { eggs: 0, totalClicks: 0, auto: 0, clickPower: 1, autoCost: 50, clickCost: 100, prestige: 0, color: 'white', colorBonus: 1, ownedColors: ['white'] };
    let pendingClicksForGlobal = 0; 
    let showEffects = localStorage.getItem('chickenEffects') !== 'false';

    const saved = localStorage.getItem('chickenSave');
    if(saved) Object.assign(data, JSON.parse(saved));

    let playerName = localStorage.getItem('chickenName') || "Fazendeiro_" + playerID;
    document.getElementById('player-name').value = playerName;

    const globalRef = doc(db, "stats", "globalCounter");
    
    async function fetchGlobalStats() {
        const snap = await getDoc(globalRef);
        if(snap.exists()) document.getElementById('global-total').innerText = snap.data().total.toLocaleString();
    }
    fetchGlobalStats();
    setInterval(fetchGlobalStats, 60000);

    window.toggleMenu = (id) => {
        const menus = ['settings-menu', 'shop-menu'];
        menus.forEach(m => {
            const el = document.getElementById(m);
            el.style.display = (m === id && el.style.display !== 'block') ? 'block' : 'none';
        });
    };

    window.saveSettings = () => {
        showEffects = document.getElementById('toggle-effects').checked;
        localStorage.setItem('chickenEffects', showEffects);
    };

    window.buyColor = (col, price, bonus) => {
        if (data.ownedColors.includes(col)) {
            data.color = col; data.colorBonus = bonus;
        } else if (data.eggs >= price) {
            data.eggs -= price; data.ownedColors.push(col); data.color = col; data.colorBonus = bonus;
        } else { alert("Ovos insuficientes!"); }
        saveLocal();
    };

    function saveLocal() {
        localStorage.setItem('chickenSave', JSON.stringify(data));
        updateUI();
    }

    async function syncWithServer() {
        // SE FOR VOCÊ (ADMIN), O JOGO NÃO ENVIA DADOS PARA O SERVIDOR (NÃO TRAPAÇA)
        if (playerID === MY_ADMIN_ID) {
            console.log("Modo Admin: Invisível no Ranking e Global.");
            loadRanking();
            return;
        }

        if (data.totalClicks > 0) {
            try {
                await setDoc(doc(db, "Admin", playerID), { 
                    name: playerName, 
                    score: Math.floor(data.totalClicks),
                    id: playerID 
                }, { merge: true });

                if (pendingClicksForGlobal > 0) {
                    const toAdd = Math.floor(pendingClicksForGlobal);
                    pendingClicksForGlobal = 0;
                    await updateDoc(globalRef, { total: increment(toAdd) }).catch(async () => {
                        await setDoc(globalRef, { total: data.totalClicks }, { merge: true });
                    });
                }
                loadRanking();
            } catch (e) { console.error("Erro na sincronização"); }
        }
    }

    // FUNÇÃO DE BANIMENTO PARA O ADMIN
    window.adminBanAction = async () => {
        if (playerID !== MY_ADMIN_ID) return;
        const target = prompt("Digite o ID do jogador para banir (Ex: CHICK-XXXXX):");
        if (target) {
            if (confirm("Deseja realmente deletar o jogador " + target + " do ranking?")) {
                try {
                    await deleteDoc(doc(db, "Admin", target));
                    alert("Jogador removido com sucesso!");
                    loadRanking();
                } catch (e) { alert("Erro ao deletar: " + e); }
            }
        }
    };

    window.clickChicken = (event) => {
        const bonus = Math.pow(2, data.prestige) * data.colorBonus;
        const gain = data.clickPower * bonus;
        data.eggs += gain; 
        data.totalClicks += gain; 
        pendingClicksForGlobal += gain; 
        
        if (showEffects) createFloatingText(event.clientX, event.clientY, "+" + Math.floor(gain));
        saveLocal();
        document.getElementById('chicken').classList.add('bounce');
        setTimeout(() => document.getElementById('chicken').classList.remove('bounce'), 100);
    };

    function createFloatingText(x, y, text) {
        const el = document.createElement('div');
        el.className = 'click-text'; el.innerText = text;
        el.style.left = (x - 10) + "px"; el.style.top = (y - 20) + "px";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    window.doPrestige = () => {
        const targets = [250000, 500000, 1000000];
        if (data.totalClicks >= targets[data.prestige] && data.prestige < 3) {
            data.prestige++; data.eggs = 0; data.auto = 0; data.clickPower = 1; data.autoCost = 50; data.clickCost = 100;
            saveLocal();
            syncWithServer();
        }
    };

    window.buyClick = () => { if(data.eggs >= data.clickCost) { data.eggs -= data.clickCost; data.clickPower++; data.clickCost = Math.floor(data.clickCost * 2.5); saveLocal(); } };
    window.buyAuto = () => { if(data.eggs >= data.autoCost) { data.eggs -= data.autoCost; data.auto++; data.autoCost = Math.floor(data.autoCost * 1.6); saveLocal(); } };

    async function loadRanking() {
        try {
            const q = query(collection(db, "Admin"), orderBy("score", "desc"), limit(10));
            const snap = await getDocs(q);
            const list = document.getElementById('rank-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `<li class="rank-item">
                    <div>
                        <b>${p.name}</b>
                        <span class="rank-id">ID: #${p.id || '---'}</span>
                    </div>
                    <b>🥚 ${Math.floor(p.score).toLocaleString()}</b>
                </li>`;
            });
        } catch (e) { console.error("Erro ao carregar ranking"); }
    }

    function updateUI() {
        document.getElementById('eggs').innerText = Math.floor(data.eggs).toLocaleString();
        document.getElementById('auto-cost').innerText = data.autoCost;
        document.getElementById('click-cost').innerText = data.clickCost;
        document.getElementById('prestige-lv').innerText = data.prestige;
        document.getElementById('chicken').className = "color-" + data.color;
        
        // MOSTRA BOTÃO DE BAN SE FOR VOCÊ
        if (playerID === MY_ADMIN_ID) {
            document.getElementById('admin-btn').style.display = 'flex';
        }

        // LIBERA RAINBOW SE TIVER 1 MILHÃO
        if (data.totalClicks >= 1000000) {
            document.getElementById('rainbow-item').style.display = 'flex';
            if (!data.ownedColors.includes('rainbow')) {
                data.ownedColors.push('rainbow');
                saveLocal();
            }
        }

        const targets = [250000, 500000, 1000000];
        if (data.prestige < 3) {
            document.getElementById('prestige-target').innerText = (targets[data.prestige] >= 1000000 ? "1M" : targets[data.prestige]/1000 + "k");
            document.getElementById('btn-prestige').style.display = data.totalClicks >= targets[data.prestige] ? 'block' : 'none';
        } else { document.getElementById('btn-prestige').style.display = 'none'; }
    }

    window.changeName = (n) => {
        const c = n.trim().substring(0, 15);
        if(c !== "" && c !== playerName) {
            playerName = c;
            localStorage.setItem('chickenName', playerName);
            saveLocal();
            syncWithServer();
        }
    };

    setInterval(() => {
        if(data.auto > 0) {
            const b = Math.pow(2, data.prestige) * data.colorBonus;
            const g = data.auto * b;
            data.eggs += g; data.totalClicks += g; pendingClicksForGlobal += g; 
            saveLocal();
        }
    }, 1000);

    setInterval(syncWithServer, 60000); 
    
    updateUI();
    loadRanking();
</script>
</body>
    </html>
