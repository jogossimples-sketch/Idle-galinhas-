<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Tycoon Online</title>
    <style>
        body { margin: 0; background: #fffde7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; position: relative; }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.5s; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #f1c40f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #global-bar { background: #5d4037; color: #ffca28; width: 100%; text-align: center; padding: 5px; font-size: 12px; font-weight: bold; }
        #header { background: #fbc02d; width: 100%; text-align: center; padding: 12px; font-weight: bold; font-size: 20px; color: #5d4037; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #stats-container { text-align: center; margin: 10px; }
        #prestige-info { font-size: 14px; color: #f57f17; font-weight: bold; margin-bottom: 5px; }
        #stats { font-size: 35px; font-weight: bold; color: #5d4037; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .icon-btn { position: absolute; width: 45px; height: 45px; cursor: pointer; z-index: 100; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #ddd; font-size: 24px; border: 2px solid #ccc; }
        #settings-btn { top: 50px; right: 15px; }
        #shop-btn { top: 110px; right: 15px; border-color: #f44336; color: #f44336; }
        #profile-btn { top: 170px; right: 15px; border-color: #0288d1; color: #0288d1; }
        #admin-btn { top: 230px; right: 15px; display: none; background: #212121; color: #ff5252; border-color: #ff5252; }
        .float-menu { display: none; position: absolute; top: 100px; right: 70px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 101; border: 2px solid #fbc02d; min-width: 200px; }
        #chicken-container { height: 160px; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; }
        #chicken { width: 120px; cursor: pointer; transition: transform 0.1s, filter 0.3s; -webkit-tap-highlight-color: transparent; z-index: 2; }
        .bounce { transform: scale(0.8); }
        .color-white { filter: none; }
        .color-brown { filter: sepia(1) saturate(2) hue-rotate(-30deg); }
        .color-blue { filter: hue-rotate(180deg) brightness(1.2); }
        .color-gold { filter: brightness(1.1) saturate(1.5) drop-shadow(0 0 8px gold); }
        .color-rainbow { animation: rainbow-anim 2s linear infinite; }
        @keyframes rainbow-anim { 0% { filter: hue-rotate(0deg) drop-shadow(0 0 10px red); } 33% { filter: hue-rotate(120deg) drop-shadow(0 0 10px green); } 66% { filter: hue-rotate(240deg) drop-shadow(0 0 10px blue); } 100% { filter: hue-rotate(360deg) drop-shadow(0 0 10px red); } }
        .click-text { position: absolute; color: #f57f17; font-weight: bold; font-size: 22px; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        #menu { background: white; width: 100%; flex-grow: 1; border-radius: 30px 30px 0 0; padding: 15px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 13px; text-align: center; }
        #btn-click { background: #0288d1; }
        #btn-auto { background: #43a047; }
        #btn-prestige { background: #9c27b0; grid-column: span 2; display: none; animation: pulse 1.5s infinite; }
        .rank-item { background: #fffde7; margin-bottom: 5px; padding: 10px; border-radius: 8px; border: 1px solid #ffe0b2; display: flex; justify-content: space-between; font-size: 12px; align-items: center; }
        .buy-color-btn { padding: 5px 10px; border-radius: 5px; border: none; background: #fbc02d; color: #5d4037; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="loadingScreen"><div class="spinner"></div><p style="color: white; margin-top: 15px; font-size: 11px;">CARREGANDO FAZENDA...</p></div>
<div id="global-bar">CLIQUES MUNDIAIS: <span id="global-total">0</span></div>
<div id="header">CHICKEN TYCOON</div>

<div id="stats-container">
    <div id="prestige-info">🏅 Prestígio: <span id="prestige-lv">0</span>/3</div>
    <div id="stats">🥚 <span id="eggs">0</span></div>
</div>

<div id="settings-btn" class="icon-btn">⚙️</div>
<div id="shop-btn" class="icon-btn">🛒</div>
<div id="profile-btn" class="icon-btn">📊</div>
<div id="admin-btn" class="icon-btn" onclick="adminBanAction()">🚫</div>

<div id="player-profile-menu" class="float-menu">
    <h4 style="color: #f57f17; text-align: center;">📊 SEU PERFIL</h4>
    <div style="font-size: 13px;">🌟 Total Carreira: <br><b id="p-total">0</b><br><br>🕒 Tempo: <span id="p-time">0m</span></div>
</div>

<div id="settings-menu" class="float-menu">
    <h4 style="font-size:14px;">Configurações</h4>
    <label style="font-size: 12px; font-weight: bold;"><input type="checkbox" id="toggle-effects" checked> Mostrar efeitos (+1)</label>
</div>

<div id="shop-menu" class="float-menu">
    <h4 style="font-size:14px; color:#f44336;">Loja de Cores</h4>
    <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>⚪ Branca (1x)</span><button class="buy-color-btn" onclick="buyColor('white', 0, 1)">USAR</button></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>🟤 Marrom (5x)</span><button class="buy-color-btn" onclick="buyColor('brown', 500000, 5)">500k</button></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>🔵 Azul (20x)</span><button class="buy-color-btn" onclick="buyColor('blue', 50000000, 20)">50M</button></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>🟡 Ouro (100x)</span><button class="buy-color-btn" onclick="buyColor('gold', 5000000000, 100)">5B</button></div>
    <div id="rainbow-item" style="display: none; justify-content:space-between;"><span>🌈 Rainbow (500x)</span><button class="buy-color-btn" onclick="buyColor('rainbow', 0, 500)">USAR</button></div>
</div>

<div id="chicken-container"><img id="chicken" src="https://cdn-icons-png.flaticon.com/512/2632/2632839.png" class="color-white"></div>

<div id="menu">
    <input type="text" id="player-name" placeholder="Seu Nome" maxlength="15" style="width:100%; padding:10px; border-radius:10px; border:2px solid #fbc02d; text-align:center; font-weight:bold;">
    <div style="text-align: center; font-size: 9px; color: #999; margin-top: 4px;">ID: <span id="display-id">...</span></div>
    <div class="btn-grid">
        <button class="btn" id="btn-prestige">✨ PRESTÍGIO: <span id="prestige-target">1M</span></button>
        <button class="btn" id="btn-click">💪 SUPER DEDO<br>🥚 <span id="click-cost">100</span></button>
        <button class="btn" id="btn-auto">👨‍🌾 AJUDANTE<br>🥚 <span id="auto-cost">50</span></button>
    </div>
    <h3>🏆 RANKING GLOBAL</h3>
    <ul id="rank-list" style="list-style: none; padding: 0;"></ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection, query, orderBy, limit, increment, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms", authDomain: "chickentycoon.firebaseapp.com", projectId: "chickentycoon", storageBucket: "chickentycoon.firebasestorage.app", messagingSenderId: "531618471959", appId: "1:531618471959:web:5484bbd6dcca21e102462e" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const MY_ADMIN_ID = "CHICK-DJEU7";

    function fNum(n) {
        if (n < 1e3) return Math.floor(n).toLocaleString();
        if (n < 1e6) return (n / 1e3).toFixed(1) + "k";
        if (n < 1e9) return (n / 1e6).toFixed(1) + "M";
        if (n < 1e12) return (n / 1e9).toFixed(1) + "B";
        if (n < 1e15) return (n / 1e12).toFixed(1) + "T";
        return (n / 1e15).toFixed(1) + "Qd";
    }

    let playerID = localStorage.getItem('chickenID') || ("CHICK-" + Math.random().toString(36).substr(2, 5).toUpperCase());
    localStorage.setItem('chickenID', playerID);
    document.getElementById('display-id').innerText = playerID;

    let data = { eggs: 0, totalClicks: 0, auto: 0, clickPower: 1, autoCost: 100, clickCost: 250, prestige: 0, color: 'white', colorBonus: 1, ownedColors: ['white'], startTime: Date.now() };
    const saved = localStorage.getItem('chickenSave');
    if(saved) Object.assign(data, JSON.parse(saved));

    // Carregar nome salvo corretamente
    let playerName = localStorage.getItem('chickenName') || "Fazendeiro";
    document.getElementById('player-name').value = playerName;

    const updateUI = () => {
        document.getElementById('eggs').innerText = fNum(data.eggs);
        document.getElementById('p-total').innerText = fNum(data.totalClicks);
        document.getElementById('click-cost').innerText = fNum(data.clickCost);
        document.getElementById('auto-cost').innerText = fNum(data.autoCost);
        document.getElementById('prestige-lv').innerText = data.prestige;
        document.getElementById('chicken').className = "color-" + data.color;
        
        const targets = [1000000, 100000000, 1000000000];
        if (data.prestige < 3) {
            document.getElementById('prestige-target').innerText = fNum(targets[data.prestige]);
            document.getElementById('btn-prestige').style.display = data.totalClicks >= targets[data.prestige] ? 'block' : 'none';
        }
        if (playerID === MY_ADMIN_ID) document.getElementById('admin-btn').style.display = 'flex';
    };

    const syncWithServer = async () => {
        const score = Math.trunc(Number(data.totalClicks));
        await setDoc(doc(db, "Admin", playerID), { name: playerName, score: score, id: playerID }, { merge: true });
        
        // Atualizar Contador Mundial sem travar
        const globalRef = doc(db, "stats", "globalCounter");
        const gSnap = await getDoc(globalRef);
        if(gSnap.exists()) {
            document.getElementById('global-total').innerText = fNum(gSnap.data().total);
        }
        
        loadRanking();
    };

    const loadRanking = async () => {
        const q = query(collection(db, "Admin"), orderBy("score", "desc"), limit(10));
        const snap = await getDocs(q, { source: 'server' });
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        let i = 0;
        snap.forEach(d => {
            i++;
            const p = d.data();
            list.innerHTML += `<li class="rank-item"><b>#${i} ${p.name}</b> <span>🥚 ${fNum(p.score)}</span></li>`;
        });
    };

    document.getElementById('chicken').onclick = (e) => {
        const gain = data.clickPower * Math.pow(4, data.prestige) * data.colorBonus;
        data.eggs += gain; data.totalClicks += gain;
        if (document.getElementById('toggle-effects').checked) {
            const el = document.createElement('div'); el.className = 'click-text'; el.innerText = "+" + fNum(gain);
            el.style.left = e.clientX + "px"; el.style.top = e.clientY + "px";
            document.body.appendChild(el); setTimeout(() => el.remove(), 600);
        }
        saveLocal();
    };

    window.buyColor = (col, price, bonus) => {
        if (data.ownedColors.includes(col)) { data.color = col; data.colorBonus = bonus; }
        else if (data.eggs >= price) { data.eggs -= price; data.ownedColors.push(col); data.color = col; data.colorBonus = bonus; }
        saveLocal();
    };

    document.getElementById('btn-click').onclick = () => {
        if(data.eggs >= data.clickCost) { data.eggs -= data.clickCost; data.clickPower++; data.clickCost = Math.floor(data.clickCost * 3.5); saveLocal(); }
    };

    document.getElementById('btn-auto').onclick = () => {
        if(data.eggs >= data.autoCost) { data.eggs -= data.autoCost; data.auto++; data.autoCost = Math.floor(data.autoCost * 2.2); saveLocal(); }
    };

    document.getElementById('btn-prestige').onclick = () => {
        const targets = [1000000, 100000000, 1000000000];
        if (data.totalClicks >= targets[data.prestige]) {
            data.prestige++; data.eggs = 0; data.auto = 0; data.clickPower = 1; data.clickCost = 250; data.autoCost = 100;
            saveLocal(); syncWithServer();
        }
    };

    const saveLocal = () => { localStorage.setItem('chickenSave', JSON.stringify(data)); updateUI(); };

    window.addEventListener('load', () => {
        document.getElementById("loadingScreen").style.display = "none";
        updateUI(); 
        syncWithServer(); // Sincroniza logo ao abrir para carregar nome e global
        setInterval(() => { if(data.auto > 0) { data.eggs += (data.auto * Math.pow(4, data.prestige) * data.colorBonus); saveLocal(); } }, 1000);
        setInterval(syncWithServer, 60000);
    });

    const toggle = (id) => { const el = document.getElementById(id); el.style.display = el.style.display === 'block' ? 'none' : 'block'; };
    document.getElementById('shop-btn').onclick = () => toggle('shop-menu');
    document.getElementById('settings-btn').onclick = () => toggle('settings-menu');
    document.getElementById('profile-btn').onclick = () => toggle('player-profile-menu');
    
    // CORREÇÃO DEFINITIVA DO NOME
    document.getElementById('player-name').onchange = (e) => { 
        playerName = e.target.value.trim().substring(0, 15) || "Fazendeiro";
        localStorage.setItem('chickenName', playerName); 
        syncWithServer(); 
    };

    window.adminBanAction = async () => {
        if (playerID !== MY_ADMIN_ID) return;
        const target = prompt("ID para banir:");
        if (target && confirm("Banir #" + target + "?")) { await deleteDoc(doc(db, "Admin", target)); loadRanking(); }
    };
</script>
</body>
        </html>
