<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Tycoon Online</title>
    <style>
        body { margin: 0; background: #fffde7; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        #header { background: #fbc02d; width: 100%; text-align: center; padding: 10px; font-weight: bold; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #stats { font-size: 35px; margin: 15px; font-weight: bold; color: #5d4037; }
        #chicken { font-size: 130px; cursor: pointer; user-select: none; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        #chicken:active { transform: scale(0.85); }
        #menu { background: white; width: 100%; flex-grow: 1; border-radius: 25px 25px 0 0; padding: 20px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .rank-item { background: #f9f9f9; margin: 5px 0; padding: 10px; border-radius: 8px; list-style: none; border: 1px solid #eee; display: flex; justify-content: space-between; }
        button { background: #43a047; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; font-size: 14px; }
        h3 { margin-top: 0; color: #f57f17; text-align: center; }
    </style>
</head>
<body>

<div id="header">CHICKEN TYCOON GLOBAL</div>
<div id="stats">🥚 <span id="eggs">0</span></div>
<div id="chicken" onclick="clickChicken()">🐔</div>

<div id="menu">
    <h3>🏆 Ranking de Fazendeiros</h3>
    <ul id="rank-list" style="padding: 0; max-height: 150px; overflow-y: auto;">Carregando ranking...</ul>
    <button onclick="buyAuto()">CONTRATAR AJUDANTE (+1/seg)<br>Preço: 🥚 <span id="cost">50</span></button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Suas chaves extraídas da imagem
    const firebaseConfig = {
        apiKey: "AIzaSyBzMMXyLG1GfN4OwjeJKboRN7V0-yXfOms",
        authDomain: "chickentycoon.firebaseapp.com",
        projectId: "chickentycoon",
        storageBucket: "chickentycoon.firebasestorage.app",
        messagingSenderId: "531618471959",
        appId: "1:531618471959:web:5484bbd6dcca21e102462e",
        measurementId: "G-FFEQGQQTHS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Carregar dados locais
    let data = JSON.parse(localStorage.getItem('chickenSave')) || { eggs: 0, auto: 0, cost: 50 };
    let playerName = localStorage.getItem('chickenName');
    
    if(!playerName) {
        playerName = prompt("Bem-vindo! Qual seu nome de fazendeiro?") || "Fazendeiro_" + Math.floor(Math.random()*1000);
        localStorage.setItem('chickenName', playerName);
    }

    // Clique na galinha
    window.clickChicken = () => {
        data.eggs++;
        updateUI();
        if(data.eggs % 20 === 0) saveOnline(); // Salva no ranking a cada 20 ovos
    };

    // Compra de ajudante
    window.buyAuto = () => {
        if(data.eggs >= data.cost) {
            data.eggs -= data.cost;
            data.auto++;
            data.cost = Math.floor(data.cost * 1.6);
            updateUI();
            saveOnline();
        }
    };

    async function saveOnline() {
        localStorage.setItem('chickenSave', JSON.stringify(data));
        try {
            await setDoc(doc(db, "leaderboard", playerName), { 
                name: playerName, 
                score: Math.floor(data.eggs) 
            });
            loadRanking();
        } catch (e) { console.error("Erro ao salvar:", e); }
    }

    async function loadRanking() {
        try {
            const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(5));
            const snap = await getDocs(q);
            const list = document.getElementById('rank-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `<li class="rank-item"><span>${p.name}</span> <b>🥚 ${p.score}</b></li>`;
            });
        } catch (e) { console.error("Erro ao carregar ranking:", e); }
    }

    function updateUI() {
        document.getElementById('eggs').innerText = Math.floor(data.eggs);
        document.getElementById('cost').innerText = data.cost;
    }

    // Ganho passivo (Idle)
    setInterval(() => {
        if(data.auto > 0) {
            data.eggs += data.auto;
            updateUI();
            if(Math.random() < 0.1) saveOnline(); // Chance de salvar automático
        }
    }, 1000);

    loadRanking();
    updateUI();
</script>
</body>
</html>
